name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.28.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Initialize browser diagnostics
        run: |
          mkdir -p browser-diagnostics
          printf 'commit=%s\nrun=%s\nattempt=%s\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" \
            > browser-diagnostics/context.txt
      - run: pnpm run test:unit
      - run: pnpm run snapshot:validate
      - run: pnpm run check
      - run: pnpm run build
      - name: Install Chromium for browser verification
        run: pnpm exec playwright install --with-deps chromium
      - name: Run deterministic browser verification
        run: pnpm run test:e2e
      - name: Upload browser failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
            browser-diagnostics/
          if-no-files-found: error
          retention-days: 7
      - run: pnpm run check:public
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist
          if-no-files-found: error
